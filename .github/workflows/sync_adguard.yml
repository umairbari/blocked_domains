name: Convert Blocklist to AdGuard Format

on:
  push:
    paths:
      - 'list.txt' # Only runs when this file changes
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push the new file back
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Converter
        run: python convert.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add adguard_list.txt
          git commit -m "Auto-update AdGuard blocklist format" || exit 0
          git push
